<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4080ff"/>
      <stop offset="50%" style="stop-color:#60a0ff"/>
      <stop offset="100%" style="stop-color:#4080ff"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4080ff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#9060ff;stop-opacity:0.2"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" style="stop-color:#4080ff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#4080ff;stop-opacity:0"/>
    </radialGradient>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#glow)"/>

  <!-- Accent ring -->
  <rect x="36" y="36" width="952" height="952" rx="196" ry="196" fill="none" stroke="url(#ring)" stroke-width="1.5"/>

  <!-- Glow behind pulse -->
  <polyline
    points="140,512 240,512 310,400 380,590 450,340 512,650 574,300 640,600 710,420 780,530 850,512 884,512"
    fill="none" stroke="#4080ff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"
    opacity="0.2" filter="url(#softBlur)"/>

  <!-- Main pulse -->
  <polyline
    points="140,512 240,512 310,400 380,590 450,340 512,650 574,300 640,600 710,420 780,530 850,512 884,512"
    fill="none" stroke="url(#pulse)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#lineGlow)"/>

  <!-- Peak dot -->
  <circle cx="574" cy="300" r="9" fill="#60a0ff" opacity="0.85"/>
  <circle cx="574" cy="300" r="4.5" fill="#ffffff" opacity="0.95"/>
</svg>
