<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <!-- Pulse glow gradient -->
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4080ff"/>
      <stop offset="50%" style="stop-color:#60a0ff"/>
      <stop offset="100%" style="stop-color:#4080ff"/>
    </linearGradient>
    <!-- Accent ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4080ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#9060ff;stop-opacity:0.3"/>
    </linearGradient>
    <!-- Inner glow -->
    <radialGradient id="innerGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#4080ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4080ff;stop-opacity:0"/>
    </radialGradient>
    <!-- Shadow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#innerGlow)"/>

  <!-- Outer ring accent -->
  <rect x="32" y="32" width="960" height="960" rx="200" ry="200" fill="none" stroke="url(#ringGrad)" stroke-width="2"/>

  <!-- Pulse line glow (behind) -->
  <polyline
    points="160,512 280,512 340,380 400,600 460,320 520,680 580,280 640,620 700,400 760,520 830,512 864,512"
    fill="none"
    stroke="#4080ff"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.25"
    filter="url(#softGlow)"
  />

  <!-- Main pulse waveform -->
  <polyline
    points="160,512 280,512 340,380 400,600 460,320 520,680 580,280 640,620 700,400 760,520 830,512 864,512"
    fill="none"
    stroke="url(#pulseGrad)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Active pulse dot -->
  <circle cx="580" cy="280" r="10" fill="#60a0ff" opacity="0.9">
    <animate attributeName="r" values="8;12;8" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="280" r="5" fill="#ffffff" opacity="0.95"/>

  <!-- Bottom text: PULSEDESK -->
  <text x="512" y="780" text-anchor="middle" font-family="-apple-system, SF Pro Rounded, Helvetica Neue, sans-serif" font-size="72" font-weight="700" letter-spacing="12" fill="#ffffff" opacity="0.85">
    PULSEDESK
  </text>

  <!-- Subtitle -->
  <text x="512" y="830" text-anchor="middle" font-family="-apple-system, SF Pro Rounded, Helvetica Neue, sans-serif" font-size="28" font-weight="500" letter-spacing="8" fill="#4080ff" opacity="0.6">
    SYSTEM MONITOR
  </text>
</svg>
